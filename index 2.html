<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マロちゃんカキカキ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <h1>マロちゃんカキカキ</h1>
  <p id="message" class="message">音オンを押してね</p>

  <section class="game">
    <div class="imageWrap">
      <img id="maro" src="maro.png" alt="マロちゃん" draggable="false">

      <button class="zone cheekL" aria-label="左ほっぺ"></button>
      <button class="zone cheekR" aria-label="右ほっぺ"></button>
      <button class="zone forehead" aria-label="おでこ"></button>
      <button class="zone bad body" aria-label="からだ"></button>
      <button class="zone bad wing" aria-label="はね"></button>
      <button class="zone bad tail" aria-label="おしり"></button>

      <div id="effects" class="effects"></div>

      <div id="sleepOverlay" class="sleepOverlay">
        <div class="sleepCard">
          <div class="sleepTitle">すやすや…</div>
          <div class="sleepFace">💤</div>
          <div class="sleepText">マロちゃん寝ちゃった</div>
        </div>
      </div>
    </div>

    <div class="meterRow">
      <span>ごきげん</span>
      <div class="meter"><div id="meterFill"></div></div>
      <strong id="score">0</strong>
    </div>

    <div class="buttons">
      <button id="soundBtn">音オン</button>
      <button id="testBtn">音テスト</button>
      <button id="resetBtn">リセット</button>
    </div>
  </section>

  <p class="hint">左右のほっぺは長押しでカキカキ。100点後にもう一回なでると寝るよ。</p>

  <audio id="ok1" src="ok1.wav" preload="auto" playsinline></audio>
  <audio id="ok2" src="ok2.wav" preload="auto" playsinline></audio>
  <audio id="ok3" src="ok3.wav" preload="auto" playsinline></audio>
  <audio id="ng1" src="ng1.wav" preload="auto" playsinline></audio>
  <audio id="ng2" src="ng2.wav" preload="auto" playsinline></audio>
  <audio id="ng3" src="ng3.wav" preload="auto" playsinline></audio>
  <audio id="clear" src="clear.wav" preload="auto" playsinline></audio>
  <audio id="sleep" src="sleep.wav" preload="auto" playsinline></audio>
  <audio id="test" src="test.wav" preload="auto" playsinline></audio>
</main>
<script src="script.js"></script>
</body>
</html>
